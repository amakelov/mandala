# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Mandala
author: A. Makelov
# logo: logo.png

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: cache # use 'force' to execute every time; use 'cache' to reuse
  allow_errors: true
  timeout: 300

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/executablebooks/jupyter-book  # Online location of your book
  path_to_book: jbook/docs  # Optional path to your book, relative to the repository root
  branch: master  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true

################################################################################
### new stuff
################################################################################
### sphinx config
sphinx:
  config:
    project: Mandala
    copyright: '2021, A. Makelov'
    author: 'A. Makelov'
    release: '0.1'
    # html_theme: sphinx_rtd_theme
    # to enable custom css
    html_static_path: ['_static']
    html_css_files: ['custom.css']
    # to avoid having separate cells for e.g. multiple logging outputs
    nb_merge_streams: true 
    mathjax_path: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  extra_extensions:
    - sphinx_proof

### other customizations 
only_build_toc_files: true